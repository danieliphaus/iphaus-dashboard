<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ipHaus — Market Intelligence Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root {
  --bg: #0a0e1a; --card: #111827; --card-hover: #1a2235;
  --border: #1e293b; --border-accent: #334155;
  --text: #f1f5f9; --text2: #94a3b8; --text3: #64748b;
  --blue: #3b82f6; --cyan: #06b6d4; --green: #10b981;
  --amber: #f59e0b; --rose: #f43f5e; --violet: #8b5cf6;
  --orange: #f97316; --shadow: 0 4px 12px rgba(0,0,0,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.dash { max-width:1440px; margin:0 auto; padding:16px; }

/* Header */
.hdr { background:linear-gradient(135deg,#0f172a,#1e293b); border:1px solid var(--border);
  border-radius:14px; padding:20px 28px; display:flex; justify-content:space-between;
  align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
.hdr h1 { font-size:20px; font-weight:700; display:flex; align-items:center; gap:8px; }
.hdr-right { display:flex; align-items:center; gap:12px; }
.live { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--green); }
.live .dot { width:8px; height:8px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.sel { background:#1e293b; border:1px solid var(--border-accent); border-radius:8px;
  padding:6px 12px; color:var(--text2); font-size:13px; font-family:inherit; }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:16px; overflow-x:auto; }
.tab { padding:10px 18px; font-size:13px; font-weight:500; color:var(--text3); cursor:pointer;
  border-bottom:2px solid transparent; white-space:nowrap; transition:all .2s; background:none; border-top:none; border-left:none; border-right:none; }
.tab:hover { color:var(--text2); }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); }

/* Cards */
.grid { display:grid; gap:12px; }
.g2 { grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); }
.g3 { grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); }
.g6 { grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); }
.card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:20px; }
.card h3 { font-size:14px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
.card .sub { font-size:11px; color:var(--text3); margin-top:-8px; margin-bottom:12px; }
.kpi { text-align:center; padding:16px; }
.kpi .label { font-size:11px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; }
.kpi .val { font-size:26px; font-weight:700; margin:4px 0; }
.kpi .det { font-size:11px; color:var(--text3); }

/* Filters */
.filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.fbtn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:500; cursor:pointer;
  border:none; transition:all .15s; font-family:inherit; }
.fbtn { background:#1e293b; color:var(--text3); }
.fbtn.active { background:var(--blue); color:#fff; }
.fbtn:hover { background:#334155; color:var(--text); }
.fbtn.active:hover { background:#2563eb; }

/* Table */
table { width:100%; border-collapse:collapse; font-size:12px; }
th { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); color:var(--text3);
  font-weight:600; text-transform:uppercase; font-size:11px; letter-spacing:.3px; cursor:pointer; }
th:hover { color:var(--text); }
td { padding:8px 10px; border-bottom:1px solid var(--border); color:var(--text2); }
tr:hover td { background:rgba(255,255,255,.02); }
.badge { padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; }

/* Sliders */
.ctrl { display:flex; flex-direction:column; gap:4px; }
.ctrl label { font-size:11px; color:var(--text3); display:flex; justify-content:space-between; }
.ctrl input[type=range] { width:100%; accent-color:var(--violet); }
.tog { padding:5px 12px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer;
  border:none; transition:all .15s; font-family:inherit; }
.tog { background:#1e293b; color:var(--text3); }
.tog.on { background:var(--violet); color:#fff; }
.result { background:#1e293b; border-radius:10px; padding:16px; text-align:center; margin-top:8px; }
.result .price { font-size:28px; font-weight:700; color:var(--violet); }
.result .psf { font-size:13px; color:var(--text3); }

/* Section visibility */
.section { display:none; flex-direction:column; gap:14px; }
.section.active { display:flex; }

/* Chart canvas sizing */
.chart-wrap { position:relative; height:280px; }
.chart-wrap canvas { width:100%!important; height:100%!important; }

/* Responsive */
@media(max-width:768px) {
  .g2,.g3,.g6 { grid-template-columns:1fr; }
  .hdr { flex-direction:column; align-items:flex-start; }
}

/* Walk badges */
.walk-badges { display:flex; justify-content:space-around; padding:10px 0; }
.wb { text-align:center; }
.wb .score { font-size:28px; font-weight:700; }
.wb .lbl { font-size:11px; color:var(--text3); }
.wb .desc { font-size:11px; color:var(--text3); }

/* Footer */
.footer { text-align:center; padding:20px; border-top:1px solid var(--border); margin-top:20px; }
.footer p { font-size:11px; color:var(--text3); }

/* Zoning */
.zn-pill { padding:4px 10px; border-radius:16px; border:1px solid var(--border); background:transparent;
  color:var(--text3); font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; font-family:inherit; white-space:nowrap; }
.zn-pill:hover { border-color:var(--pill-c,var(--blue)); color:var(--pill-c,var(--blue)); }
.zn-pill-active { background:var(--pill-c,var(--blue)); border-color:var(--pill-c,var(--blue)); color:#fff; }
.zn-pill-active:hover { color:#fff; }
.zn-cnt { display:inline-block; background:rgba(255,255,255,.15); border-radius:8px; padding:0 5px; margin-left:3px; font-size:10px; }
.zn-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px; transition:all .2s; }
.zn-card:hover { border-color:var(--blue); box-shadow:0 4px 12px rgba(59,130,246,.12); }
.zn-def { font-size:12px; color:var(--text2); line-height:1.55; max-height:68px; overflow:hidden; }
.zn-def-exp { max-height:none; }
.zn-more { font-size:11px; color:var(--blue); cursor:pointer; background:none; border:none; font-family:inherit; font-weight:600; padding:0; }

/* Compliance */
.comply-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px;
  border-bottom:1px solid var(--border); font-size:13px; }
.comply-row:last-child { border-bottom:none; }
.comply-label { color:var(--text2); font-weight:500; }
.comply-vals { display:flex; align-items:center; gap:12px; }
.comply-val { font-weight:600; }
.comply-pass { color:var(--green); font-weight:700; font-size:12px; }
.comply-fail { color:var(--rose); font-weight:700; font-size:12px; }
.comply-bar { width:120px; height:8px; border-radius:4px; background:var(--border); overflow:hidden; }
.comply-fill { height:100%; border-radius:4px; transition:width .3s; }

/* Zoning tooltip */
.zt { text-decoration:underline dotted var(--text3); cursor:help; position:relative; }
.zt:hover .zt-tip { display:block; }
.zt-tip { display:none; position:absolute; bottom:120%; left:50%; transform:translateX(-50%);
  background:#1e293b; border:1px solid var(--border-accent); border-radius:8px; padding:10px 14px;
  width:280px; font-size:11px; color:var(--text2); line-height:1.5; z-index:999;
  box-shadow:0 8px 24px rgba(0,0,0,.4); pointer-events:none; font-weight:400; }
.zt-tip strong { color:var(--text); font-size:12px; display:block; margin-bottom:4px; }

/* Zone badge in comps */
.zone-badge { font-size:10px; font-weight:600; padding:2px 8px; border-radius:4px; cursor:pointer;
  background:rgba(6,182,212,.12); color:var(--cyan); text-transform:uppercase; white-space:nowrap; }

/* District Explainer Modal */
.zone-modal-overlay { position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.7);
  z-index:1000; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.zone-modal { background:var(--card); border:1px solid var(--border-accent); border-radius:16px;
  padding:28px; max-width:520px; width:90%; max-height:80vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.zone-modal h2 { font-size:20px; margin-bottom:4px; display:flex; align-items:center; gap:10px; }
.zone-modal .zone-modal-desc { color:var(--text2); font-size:13px; margin:8px 0 16px; line-height:1.6; }
.zone-modal .zone-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px; }
.zone-modal .zone-stat { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center; }
.zone-modal .zone-stat .zs-val { font-size:22px; font-weight:700; color:var(--cyan); }
.zone-modal .zone-stat .zs-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.5px; margin-top:4px; }
.zone-modal .zone-close { background:var(--blue); color:white; border:none; border-radius:8px; padding:8px 24px;
  font-size:13px; font-weight:600; cursor:pointer; margin-top:12px; }
.zone-modal .zone-close:hover { filter:brightness(1.1); }

/* Compliance indicator in comps table */
.far-pill { font-size:10px; font-weight:600; padding:2px 6px; border-radius:4px; display:inline-block; }
.far-ok { background:rgba(16,185,129,0.15); color:var(--green); }
.far-over { background:rgba(244,63,94,0.15); color:var(--rose); }
.far-na { background:rgba(148,163,184,0.1); color:var(--text3); }

/* Zoning fit filter */
.fit-filter { display:flex; align-items:center; gap:6px; }
.fit-filter label { font-size:11px; color:var(--text3); white-space:nowrap; }
</style>
</head>

// ═══════════════════════════════════════════════════════════════════
// DASHBOARD CLASS — reads from RAW, renders everything
// ═══════════════════════════════════════════════════════════════════
class Dashboard {
  constructor(data) {
    this.data = data;
    this.project = "lafayette";
    this.tab = "overview";
    this.boroughFilter = "All";
    this.charts = {};
    this.sortCol = null;
    this.sortDir = "desc";
    this.searchTerm = "";
    this.zoneFilter = "All";
    this.fitFilter = ""; // "would be legal in [zone]" filter
    this.showCompliance = false; // show compliance columns in comps table

    // Hedonic scenario state
    this.scenario = {
      interior_sf:1100, bedrooms:2, bathrooms:2, floor_level:3,
      has_doorman:0, has_elevator:1, has_gym:0, has_pool:0,
      has_parking:0, has_concierge:0, has_rooftop_access:0, has_storage:0,
      has_washer_dryer:0, is_corner_unit:0, is_renovated:0,
      is_new_development:1, is_loft:0, has_fireplace:0, is_condo:1,
      subway_dist_ft:500, school_rating:7, year_built:2026,
    };
    this.scenario2 = {
      interior_sf:1400, bedrooms:3, bathrooms:2.5, floor_level:8,
      has_doorman:1, has_elevator:1, has_gym:1, has_pool:0,
      has_parking:0, has_concierge:0, has_rooftop_access:0, has_storage:1,
      has_washer_dryer:1, is_corner_unit:0, is_renovated:0,
      is_new_development:1, is_loft:0, has_fireplace:0, is_condo:1,
      subway_dist_ft:400, school_rating:8, year_built:2026,
    };
    this.showCompare = false;

    this.init();
  }

  init() {
    // Meta info
    const m = this.data.meta;
    document.getElementById("metaInfo").textContent =
      `Run #${m.run_number} · ${m.generated} · ${m.connectors} connectors`;

    // Tabs
    const tabs = [
      ["overview","Overview"],["comps","Comps Explorer"],
      ["model","Hedonic Model"],["market","Market Data"],
      ["construction","Construction & Quality"],["estimate","Quick Estimate"],
      ["zoning","Zoning Reference"]
    ];
    const bar = document.getElementById("tabBar");
    tabs.forEach(([id,label]) => {
      const btn = document.createElement("button");
      btn.className = "tab" + (id === this.tab ? " active" : "");
      btn.textContent = label;
      btn.onclick = () => this.setTab(id);
      bar.appendChild(btn);
    });

    this.render();
  }

  setTab(t) {
    this.tab = t;
    document.querySelectorAll(".tab").forEach((el,i) => {
      el.classList.toggle("active", el.textContent === {
        overview:"Overview",comps:"Comps Explorer",model:"Hedonic Model",
        market:"Market Data",construction:"Construction & Quality",estimate:"Quick Estimate",
        zoning:"Zoning Reference"
      }[t]);
    });
    // Destroy old charts
    Object.values(this.charts).forEach(c => c.destroy());
    this.charts = {};
    this.render();
  }

  setProject(p) { this.project = p; this.render(); }
  setBorough(b) { this.boroughFilter = b; this.render(); }

  getComps() {
    const c = this.data.comps || [];
    if (this.boroughFilter === "All") return c;
    return c.filter(r => r.borough === this.boroughFilter);
  }

  // ── HEDONIC PREDICTION (uses REAL trained coefficients) ──
  predict(params) {
    const m = this.data.model;
    if (!m || !m.coefficients) return null;
    const c = m.coefficients;
    let logP = c.intercept || 0;
    for (const f of m.feature_names) {
      let val = params[f] || 0;
      // Apply log transform to same features the model used
      if (m.log_transformed && m.log_transformed.includes(f) && val > 0) {
        val = Math.log(val);
      }
      logP += (c[f] || 0) * val;
    }
    return Math.exp(logP);
  }

  // ── FORMAT HELPERS ──
  fmt(n) { return new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n); }
  fmtK(n) { return n>=1e6?`$${(n/1e6).toFixed(1)}M`:n>=1e3?`$${(n/1e3).toFixed(0)}K`:this.fmt(n); }
  fmtN(n) { return new Intl.NumberFormat("en-US").format(Math.round(n)); }

  boroughColor(b) {
    return {"Manhattan":"#3b82f6","Brooklyn":"#10b981","Queens":"#8b5cf6",
            "Bronx":"#f59e0b","Staten Island":"#64748b"}[b] || "#64748b";
  }

  // ── RENDER ROUTER ──
  render() {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    const sec = document.getElementById("sec-" + this.tab);
    if (sec) { sec.classList.add("active"); }

    const fn = {
      overview: () => this.renderOverview(),
      comps: () => this.renderComps(),
      model: () => this.renderModel(),
      market: () => this.renderMarket(),
      construction: () => this.renderConstruction(),
      estimate: () => this.renderEstimate(),
      zoning: () => this.renderZoning(),
    }[this.tab];
    if (fn) fn();
  }

  // ══════════════════════════════════════════
  // OVERVIEW
  // ══════════════════════════════════════════
  renderOverview() {
    const comps = this.data.comps || [];
    const m = this.data.model;
    const ws = this.project === "lafayette"
      ? this.data.walkscore?.lafayette : this.data.walkscore?.puerto_rico;
    const bls = this.data.bls;
    const latestNYC = bls?.nyc_unemployment?.slice(-1)[0]?.value || "N/A";
    const census = this.data.census;
    const fred = this.data.fred || {};
    const osm = this.data.osm || {};

    // Avg PSF
    const avgPSF = comps.length ?
      Math.round(comps.reduce((s,c) => s + c.sale_price/c.interior_sf, 0) / comps.length) : 0;

    // Latest mortgage rate from FRED
    const mtgData = fred.mortgage_30yr?.data || [];
    const latestMtg = mtgData.length ? mtgData[mtgData.length-1].value : null;

    // POI summary
    const poiCats = osm.categories || {};
    const poiTotal = osm.total || 0;

    const sec = document.getElementById("sec-overview");
    sec.innerHTML = `
      <div class="grid g6">
        ${this.kpi("Avg $/SF", "$"+avgPSF.toLocaleString(), "Across "+comps.length+" comps", "var(--blue)")}
        ${this.kpi("Comps", comps.length, "Curated sample", "var(--green)")}
        ${this.kpi("Walk Score", ws?.walk_score||"—", this.project==="lafayette"?"Lafayette":"Dorado", "var(--amber)")}
        ${this.kpi("Model R²", m?.r2||"—", (m?.n_features||0)+"+ attributes", "var(--violet)")}
        ${this.kpi("Mortgage", latestMtg ? latestMtg+"%" : "—", "30yr fixed (FRED)", "var(--cyan)")}
        ${this.kpi("Home Value", this.fmtK(census?.median_home_value||0), "Brooklyn median", "var(--orange)")}
      </div>
      <div class="grid g2">
        <div class="card"><h3>🏙️ Avg Price/SF by Borough</h3><div class="chart-wrap"><canvas id="chBoro"></canvas></div></div>
        <div class="card"><h3>💼 Unemployment Trend (24mo)</h3><div class="chart-wrap"><canvas id="chUnemp"></canvas></div></div>
      </div>
      <div class="grid g2">
        <div class="card"><h3>🚶 Walk Score — ${this.project==="lafayette"?"722 Lafayette Ave":"Dorado, PR"}</h3>
          <div class="walk-badges">
            ${this.walkBadge("Walk", ws?.walk_score, ws?.walk_description, "var(--green)")}
            ${this.walkBadge("Transit", ws?.transit_score, ws?.transit_description, "var(--blue)")}
            ${this.walkBadge("Bike", ws?.bike_score, ws?.bike_description, "var(--amber)")}
          </div>
        </div>
        <div class="card"><h3>🏠 Fair Market Rents (HUD)</h3><div class="chart-wrap"><canvas id="chFMR"></canvas></div></div>
      </div>
      ${poiTotal > 0 ? `
      <div class="card"><h3>📍 Location Intelligence — ${osm.radius||800}m Radius</h3>
        <p class="sub">${poiTotal} amenities near 722 Lafayette Ave via OpenStreetMap</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:12px;">
          ${Object.entries(poiCats).map(([k,v]) => `
            <div style="background:rgba(59,130,246,.06);border:1px solid rgba(59,130,246,.15);border-radius:10px;padding:12px;text-align:center;">
              <div style="font-size:22px;font-weight:700;color:var(--blue);">${v.count||0}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:2px;">${v.label||k}</div>
              ${(v.items||[]).slice(0,3).map(i => `<div style="font-size:10px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${i.name}</div>`).join("")}
            </div>
          `).join("")}
        </div>
      </div>` : ""}`;

    // Borough PSF chart
    const boroughs = {};
    comps.forEach(c => {
      if (!boroughs[c.borough]) boroughs[c.borough] = [];
      boroughs[c.borough].push(c.sale_price / c.interior_sf);
    });
    const bLabels = Object.keys(boroughs).sort((a,b) =>
      (boroughs[b].reduce((s,v)=>s+v,0)/boroughs[b].length) -
      (boroughs[a].reduce((s,v)=>s+v,0)/boroughs[a].length));
    const bData = bLabels.map(b => Math.round(boroughs[b].reduce((s,v)=>s+v,0)/boroughs[b].length));
    const bColors = bLabels.map(b => this.boroughColor(b));
    this.charts.boro = this.barChart("chBoro", bLabels, bData, bColors, "$","currency");

    // Unemployment chart
    const nyc = bls?.nyc_unemployment || [];
    const pr = bls?.pr_unemployment || [];
    const uLabels = nyc.map(d => d.label);
    this.charts.unemp = this.lineChart("chUnemp", uLabels,
      [{label:"NYC Metro",data:nyc.map(d=>d.value),color:"#3b82f6"},
       {label:"Puerto Rico",data:pr.map(d=>d.value),color:"#f59e0b"}], "%");

    // FMR chart
    const hBk = this.data.hud?.brooklyn || {};
    const hDo = this.data.hud?.dorado || {};
    const fmrLabels = ["Studio","1BR","2BR","3BR","4BR"];
    const fmrBk = [hBk.studio,hBk.one_br,hBk.two_br,hBk.three_br,hBk.four_br];
    const fmrDo = [hDo.studio,hDo.one_br,hDo.two_br,hDo.three_br,hDo.four_br];
    this.charts.fmr = this.groupedBar("chFMR", fmrLabels,
      [{label:"Brooklyn",data:fmrBk,color:"#3b82f6"},{label:"Dorado",data:fmrDo,color:"#f59e0b"}]);
  }

  // ══════════════════════════════════════════
  // COMPS EXPLORER
  // ══════════════════════════════════════════
  renderComps() {
    const allBoroughs = ["All", ...new Set(this.data.comps.map(c=>c.borough))];
    const comps = this.getComps();
    let filtered = this.searchTerm ? comps.filter(c =>
      (c.address+" "+c.neighborhood+" "+c.borough).toLowerCase().includes(this.searchTerm.toLowerCase())
    ) : [...comps];
    if (this.zoneFilter !== "All") {
      filtered = filtered.filter(c => Dashboard.getZone(c) === this.zoneFilter);
    }
    // Zoning fit filter: only show comps that would be legal in target zone
    if (this.fitFilter) {
      filtered = filtered.filter(c => Dashboard.wouldBeLegal(c, this.fitFilter) !== false);
    }

    const allZones = [...new Set(comps.map(c=>Dashboard.getZone(c)))].filter(z=>z!=="—").sort();
    const fitZones = Object.keys(Dashboard.DISTRICT_RULES).sort();

    const sec = document.getElementById("sec-comps");
    sec.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div class="filters" id="boroFilters" style="margin-bottom:0;"></div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <select class="sel" onchange="D.zoneFilter=this.value;D.renderComps();" style="font-size:12px;">

              `<option value="${z}"${this.zoneFilter===z?" selected":""}>${z}</option>`
            ).join("")}

      Object.keys(boroCounts), Object.values(boroCounts),
      Object.keys(boroCounts).map(b => this.boroughColor(b)));

    // Table
    this.renderCompTable(filtered);

  renderCompTable(comps) {
    const cols = [
      {key:"address",label:"Address"},{key:"borough",label:"Borough"},
      {key:"neighborhood",label:"Neighborhood"},{key:"_zone",label:"Zone"},
      {key:"sale_price",label:"Price",fmt:"currency"},
      {key:"interior_sf",label:"SF",fmt:"number"},{key:"price_per_sf",label:"$/SF",fmt:"currency"},
      {key:"bedrooms",label:"Bed"},{key:"bathrooms",label:"Bath"},{key:"year_built",label:"Year"}
    ];
    // Add compliance columns when toggled
    if (this.showCompliance) {
      cols.push({key:"_lot",label:"Lot SF",fmt:"number"});
      cols.push({key:"_far",label:"FAR"});
      cols.push({key:"_farStatus",label:"Status"});
    }
    let sorted = [...comps];
    if (this.sortCol) {
      sorted.sort((a,b) => {
        let av = a[this.sortCol], bv = b[this.sortCol];
        // Handle virtual columns
        if (this.sortCol === "_far") {
          const pa = Dashboard.getPluto(a), pb = Dashboard.getPluto(b);
          av = pa && pa.lot > 0 ? pa.bldg/pa.lot : 0;
          bv = pb && pb.lot > 0 ? pb.bldg/pb.lot : 0;
        } else if (this.sortCol === "_lot") {
          const pa = Dashboard.getPluto(a), pb = Dashboard.getPluto(b);
          av = pa ? pa.lot : 0; bv = pb ? pb.lot : 0;
        }
        const cmp = av < bv ? -1 : av > bv ? 1 : 0;
        return this.sortDir === "asc" ? cmp : -cmp;
      });
    }
    let html = '<table><thead><tr>';
    cols.forEach(c => {
      const arrow = this.sortCol === c.key ? (this.sortDir==="asc"?" ▲":" ▼") : "";
      html += `<th onclick="D.sortBy('${c.key}')">${c.label}${arrow}</th>`;
    });
    html += '</tr></thead><tbody>';
    sorted.forEach(r => {
      const cc = Dashboard.complianceCheck(r);
      html += '<tr>';
      cols.forEach(c => {
        let v = r[c.key];
        if (c.fmt === "currency") v = this.fmt(v);
        else if (c.fmt === "number") v = this.fmtN(v);
        if (c.key === "_zone") {
          const z = Dashboard.getZone(r);
          const p = Dashboard.getPluto(r);
          const src = p ? '(PLUTO)' : '(approx)';
          v = `<span class="zone-badge" onclick="D.showZoneExplainer('${z.replace(/'/g,"\\'")}')" title="Click for details ${src}">${z}</span>`;
        }
        else if (c.key === "borough") v = `<span class="badge" style="background:${this.boroughColor(r.borough)}22;color:${this.boroughColor(r.borough)}">${v}</span>`;
        else if (c.key === "_lot") v = cc ? cc.lotArea.toLocaleString() : "—";
        else if (c.key === "_far") v = cc ? cc.actualFAR : "—";
        else if (c.key === "_farStatus") {
          if (cc) {
            v = `<span class="far-pill ${cc.farOk?"far-ok":"far-over"}">${cc.farPct}% ${cc.farOk?"OK":"OVER"}</span>`;
          } else {
            v = `<span class="far-pill far-na">N/A</span>`;
          }
        }
        html += `<td>${v}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById("compTable").innerHTML = html;
  }

  // Show district explainer modal
  showZoneExplainer(zone) {
    // Try exact match first, then strip overlay prefix
    let info = Dashboard.districtExplainer(zone);
    if (!info) {
      // Try residential equivalent (e.g., M1-5/R9X -> R9X)
      const parts = zone.split('/');
      for (const p of parts) {
        info = Dashboard.districtExplainer(p);
        if (info) break;
      }
    }
    if (!info) {
      info = {zone, desc:"District rules not available for this zone.", far:"—", height:"—", base:"—", lotCov:"—", parking:"—"};
    }
    // Count comps in this zone
    const compsInZone = this.data.comps.filter(c => Dashboard.getZone(c) === zone).length;

    const overlay = document.createElement("div");
    overlay.className = "zone-modal-overlay";
    overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    overlay.innerHTML = `
      <div class="zone-modal">
        <h2><span class="zone-badge" style="font-size:14px;padding:4px 12px;">${zone}</span> District</h2>
        <p class="zone-modal-desc">${Dashboard.termTip(info.desc)}</p>
        <div class="zone-stats">
          <div class="zone-stat"><div class="zs-val">${info.far}</div><div class="zs-label">Max FAR</div></div>
          <div class="zone-stat"><div class="zs-val">${info.height || "None"}</div><div class="zs-label">Height (ft)</div></div>
          <div class="zone-stat"><div class="zs-val">${info.lotCov}%</div><div class="zs-label">Lot Coverage</div></div>
          <div class="zone-stat"><div class="zs-val">${info.base || "N/A"}</div><div class="zs-label">Base Height</div></div>
          <div class="zone-stat"><div class="zs-val">${info.parking}</div><div class="zs-label">Parking/Unit</div></div>
          <div class="zone-stat"><div class="zs-val">${compsInZone}</div><div class="zs-label">Comps</div></div>
        </div>
        <p style="font-size:11px;color:var(--text3);margin-bottom:8px;">Source: NYC Zoning Resolution · PLUTO v24.1</p>
        <button class="zone-close" onclick="this.closest('.zone-modal-overlay').remove()">Close</button>
      </div>`;
    document.body.appendChild(overlay);
  }

  sortBy(col) {
    if (this.sortCol === col) this.sortDir = this.sortDir === "asc" ? "desc" : "asc";
    else { this.sortCol = col; this.sortDir = "desc"; }
    this.renderComps();
  }

  // ══════════════════════════════════════════
  // HEDONIC MODEL
  // ══════════════════════════════════════════
  renderModel() {
    const m = this.data.model;
    if (!m) {
      document.getElementById("sec-model").innerHTML = '<div class="card"><p>Model not available — run hedonic_model.py to generate coefficients.</p></div>';
      return;
    }
    const p1 = this.predict(this.scenario);
    const p2 = this.showCompare ? this.predict(this.scenario2) : null;
    const psf1 = p1 ? p1/this.scenario.interior_sf : 0;
    const psf2 = p2 ? p2/this.scenario2.interior_sf : 0;

    const sec = document.getElementById("sec-model");
    sec.innerHTML = `
      <div class="card" style="background:linear-gradient(135deg,rgba(139,92,246,.1),rgba(59,130,246,.1));border-color:rgba(139,92,246,.2);">
        <p style="font-size:13px;color:var(--text2);">
          <strong style="color:var(--violet);">Live Hedonic Pricing Model</strong> —
          R² = ${m.r2} · ${m.n_features} features · Trained on ${m.n_comps} curated NYC comps · Median price ${this.fmtK(m.median_price)}.
          Adjust sliders to see predicted values update in real time using the <em>actual trained coefficients</em>.
        </p>
      </div>
      <div class="grid g2">
        <div class="card">
          <h3>🏠 Scenario A</h3>
          <div id="controls1"></div>
          <div class="result"><div class="price">${p1 ? this.fmtK(p1) : "—"}</div><div class="psf">${p1 ? this.fmt(Math.round(psf1))+"/SF" : ""}</div></div>
        </div>
        <div class="card">
          <h3>${this.showCompare ? "🏢 Scenario B" : "⚡ Compare"}</h3>
          ${this.showCompare ? `
            <div id="controls2"></div>
            <div class="result"><div class="price" style="color:var(--blue);">${p2 ? this.fmtK(p2) : "—"}</div><div class="psf">${p2 ? this.fmt(Math.round(psf2))+"/SF" : ""}</div></div>
            ${p1 && p2 ? `<div style="text-align:center;margin-top:8px;font-size:13px;color:${p2>p1?"var(--green)":"var(--rose)"};">${p2>p1?"+":""}${this.fmtK(p2-p1)} (${((p2/p1-1)*100).toFixed(1)}%)</div>` : ""}
          ` : `<div style="display:flex;align-items:center;justify-content:center;height:200px;">
            <button class="fbtn active" onclick="D.showCompare=true;D.renderModel();">+ Add Comparison Scenario</button>
          </div>`}
        </div>
      </div>
      <div class="card"><h3>💎 Top Attribute Premiums</h3><div class="chart-wrap"><canvas id="chPremiums"></canvas></div></div>
      ${m.predictions ? `<div class="card"><h3>🎯 Model Predictions vs Actuals (${m.predictions.length} comps)</h3><div id="predTable"></div></div>` : ""}
    `;

    this.buildControls("controls1", this.scenario, 1);
    if (this.showCompare) this.buildControls("controls2", this.scenario2, 2);

    // Premiums chart
    const prems = (m.premiums || []).filter(p => p.type === "premium" && Math.abs(p.pct_premium) > 1).slice(0,12);
    if (prems.length && document.getElementById("chPremiums")) {
      const ctx = document.getElementById("chPremiums").getContext("2d");
      this.charts.premiums = new Chart(ctx, {
        type:"bar",
        data: {
          labels: prems.map(p => p.label),
          datasets: [{
            data: prems.map(p => p.pct_premium),
            backgroundColor: prems.map(p => p.pct_premium > 0 ? "#10b98188" : "#f43f5e88"),
            borderColor: prems.map(p => p.pct_premium > 0 ? "#10b981" : "#f43f5e"),
            borderWidth: 1, borderRadius: 4,
          }]
        },
        options: {
          indexAxis:"y", responsive:true, maintainAspectRatio:false,
          plugins: { legend:{display:false},
            tooltip:{callbacks:{label:c=>`${c.parsed.x>0?"+":""}${c.parsed.x.toFixed(1)}% premium`}} },
          scales: {
            x: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",callback:v=>v+"%"} },
            y: { grid:{display:false}, ticks:{color:"#94a3b8",font:{size:11}} }
          }
        }
      });
    }

    // Predictions table
    if (m.predictions && document.getElementById("predTable")) {
      let html = '<table><thead><tr><th>Address</th><th>Borough</th><th>Actual</th><th>Predicted</th><th>Residual</th></tr></thead><tbody>';
      m.predictions.forEach(p => {
        const resColor = Math.abs(p.residual_pct) < 10 ? "var(--green)" : Math.abs(p.residual_pct) < 20 ? "var(--amber)" : "var(--rose)";
        html += `<tr><td>${p.address.substring(0,30)}</td><td><span class="badge" style="background:${this.boroughColor(p.borough)}22;color:${this.boroughColor(p.borough)}">${p.borough}</span></td>
          <td>${this.fmt(p.actual)}</td><td>${this.fmt(p.predicted)}</td>
          <td style="color:${resColor}">${p.residual_pct>0?"+":""}${p.residual_pct}%</td></tr>`;
      });
      html += '</tbody></table>';
      document.getElementById("predTable").innerHTML = html;
    }
  }

  buildControls(containerId, scenario, idx) {
    const el = document.getElementById(containerId);
    if (!el) return;

    const sliders = [
      ["interior_sf","Interior SF",400,4000,50],["bedrooms","Bedrooms",0,6,1],
      ["bathrooms","Bathrooms",1,5,0.5],["floor_level","Floor",1,50,1],
      ["subway_dist_ft","Subway Dist (ft)",100,3000,50],["school_rating","School Rating",1,10,0.5],
    ];
    const toggles = [
      ["is_new_development","New Dev"],["has_doorman","Doorman"],["has_elevator","Elevator"],
      ["has_gym","Gym"],["has_parking","Parking"],["has_washer_dryer","In-Unit W/D"],
      ["is_condo","Condo"],["has_concierge","Concierge"],["has_storage","Storage"],
    ];

    let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">';
    sliders.forEach(([key,label,min,max,step]) => {
      html += `<div class="ctrl"><label>${label}<span>${scenario[key]}</span></label>
        <input type="range" min="${min}" max="${max}" step="${step}" value="${scenario[key]}"
        oninput="D.updateScenario(${idx},'${key}',+this.value)"></div>`;
    });
    html += '</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">';
    toggles.forEach(([key,label]) => {
      html += `<button class="tog${scenario[key]?" on":""}" onclick="D.toggleScenario(${idx},'${key}')">${label}</button>`;
    });
    html += '</div>';
    el.innerHTML = html;
  }

  updateScenario(idx, key, val) {
    if (idx === 1) this.scenario[key] = val;
    else this.scenario2[key] = val;
    this.renderModel();
  }

  toggleScenario(idx, key) {
    if (idx === 1) this.scenario[key] = this.scenario[key] ? 0 : 1;
    else this.scenario2[key] = this.scenario2[key] ? 0 : 1;
    this.renderModel();
  }

    const evNta = ev.by_neighborhood || {};

  // ══════════════════════════════════════════
  // CSV EXPORT
  // ══════════════════════════════════════════
  exportCSV() {
    const comps = this.getComps();
    const headers = ["Address","Borough","Neighborhood","Price","Interior SF","$/SF","Bed","Bath","Year Built",
      "Doorman","Elevator","Gym","Pool","Parking","Concierge","Rooftop","Storage","W/D","Corner","Renovated","New Dev","Loft","Condo"];
    const rows = comps.map(c => [
      `"${c.address}"`, c.borough, c.neighborhood, c.sale_price, c.interior_sf,
      Math.round(c.sale_price/c.interior_sf), c.bedrooms, c.bathrooms, c.year_built,
      c.has_doorman, c.has_elevator, c.has_gym, c.has_pool, c.has_parking,
      c.has_concierge, c.has_rooftop_access, c.has_storage, c.has_washer_dryer,
      c.is_corner_unit, c.is_renovated, c.is_new_development, c.is_loft, c.is_condo
    ].join(","));
    const csv = [headers.join(","), ...rows].join("\n");
    const blob = new Blob([csv], {type:"text/csv"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `iphaus_comps_${new Date().toISOString().split("T")[0]}.csv`;
    a.click();
  }

  // ══════════════════════════════════════════
  // QUICK ESTIMATE (Team-friendly estimator)
  // ══════════════════════════════════════════
  renderEstimate() {
    const m = this.data.model;
    if (!m) {
      document.getElementById("sec-estimate").innerHTML =
        '<div class="card"><p>Model not loaded. Run the pipeline to generate coefficients.</p></div>';
      return;
    }

    // Initialize estimate state if not set
    if (!this.est) {
      this.est = {
        interior_sf:1200, bedrooms:2, bathrooms:2, floor_level:4,
        has_doorman:0, has_elevator:1, has_gym:0, has_pool:0,
        has_parking:0, has_concierge:0, has_rooftop_access:0, has_storage:0,
        has_washer_dryer:1, is_corner_unit:0, is_renovated:0,
        is_new_development:1, is_loft:0, has_fireplace:0, is_condo:1,
        subway_dist_ft:500, school_rating:7, year_built:2026,
      };
    }

    const price = this.predict(this.est);
    const psf = price ? price / this.est.interior_sf : 0;

    // Find 3 closest comps
    const comps = this.data.comps || [];
    const scored = comps.map(c => {
      const cp = this.predict(c);
      return { ...c, predicted: cp, diff: Math.abs((cp||0) - (price||0)) };
    }).sort((a,b) => a.diff - b.diff).slice(0,3);

    const sec = document.getElementById("sec-estimate");
    sec.innerHTML = `
      <div class="card" style="background:linear-gradient(135deg,rgba(16,185,129,.08),rgba(6,182,212,.08));border-color:rgba(16,185,129,.2);">
        <h3 style="font-size:16px;">⚡ Quick Property Estimate</h3>
        <p style="font-size:13px;color:var(--text2);margin-top:4px;">
          Enter your property details below. The hedonic model (R²=${m.r2}, ${m.n_comps} comps) predicts
          the market value in real-time. Share this page with your team — anyone can run estimates.
        </p>
      </div>

      <div class="grid g2">
        <div class="card">
          <h3>📐 Property Details</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            ${this.estSlider("interior_sf","Interior SF",400,5000,50)}
            ${this.estSlider("bedrooms","Bedrooms",0,6,1)}
            ${this.estSlider("bathrooms","Bathrooms",1,5,0.5)}
            ${this.estSlider("floor_level","Floor Level",1,50,1)}
            ${this.estSlider("year_built","Year Built",1900,2027,1)}
            ${this.estSlider("school_rating","School Rating",1,10,0.5)}
            ${this.estSlider("subway_dist_ft","Subway Distance (ft)",100,3000,50)}
          </div>
          <h3 style="margin-top:16px;">🏢 Amenities</h3>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
            ${["is_new_development:New Dev","has_doorman:Doorman","has_elevator:Elevator",
               "has_gym:Gym","has_pool:Pool","has_parking:Parking","has_concierge:Concierge",
               "has_rooftop_access:Rooftop","has_storage:Storage","has_washer_dryer:In-Unit W/D",
               "is_corner_unit:Corner Unit","is_renovated:Renovated","is_loft:Loft",
               "has_fireplace:Fireplace","is_condo:Condo"].map(t => {
              const [k,l] = t.split(":");
              return `<button class="tog${this.est[k]?" on":""}" onclick="D.est.${k}=D.est.${k}?0:1;D.renderEstimate();">${l}</button>`;
            }).join("")}
          </div>
        </div>

        <div class="card" style="display:flex;flex-direction:column;justify-content:center;">
          <div class="result" style="padding:28px;">
            <div style="font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:4px;">Estimated Market Value</div>
            <div class="price" style="font-size:42px;">${price ? this.fmtK(price) : "—"}</div>
            <div class="psf" style="font-size:15px;margin-top:4px;">${price ? this.fmt(Math.round(psf))+" per SF" : ""}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;">
            ${this.kpi("Price/SF", psf ? "$"+Math.round(psf).toLocaleString() : "—", "", "var(--violet)")}
            ${this.kpi("Total SF", this.est.interior_sf.toLocaleString(), "", "var(--blue)")}
            ${this.kpi("Bed/Bath", this.est.bedrooms+"/"+this.est.bathrooms, "", "var(--green)")}
          </div>
          ${scored.length ? `
          <div style="margin-top:16px;">
            <h3 style="font-size:13px;">📍 Closest Comparable Sales</h3>
            <table style="margin-top:8px;">
              <thead><tr><th>Address</th><th>Price</th><th>SF</th><th>$/SF</th></tr></thead>
              <tbody>${scored.map(c => `<tr>
                <td>${c.address.substring(0,25)}</td>
                <td>${this.fmt(c.sale_price)}</td>
                <td>${this.fmtN(c.interior_sf)}</td>
                <td>${this.fmt(Math.round(c.sale_price/c.interior_sf))}</td>
              </tr>`).join("")}</tbody>
            </table>
          </div>` : ""}
        </div>
      </div>

      <div class="card" style="border-color:rgba(6,182,212,.2);">
        <h3 style="font-size:13px;">🏛️ Zoning Context — How district rules constrain this estimate</h3>
        <p style="font-size:12px;color:var(--text2);margin:8px 0;">
          Select a zoning district to see what's actually buildable. The ${Dashboard.termTip("FAR")} determines max floor area;
          ${Dashboard.termTip("lot coverage")} limits the building footprint; ${Dashboard.termTip("building height")} caps how tall you can go.
        </p>
        <div style="display:flex;align-items:center;gap:8px;margin:10px 0;">
          <label style="font-size:12px;color:var(--text3);">District:</label>
          <select class="sel" id="estZoneSelect" style="font-size:12px;">
            ${Object.keys(Dashboard.DISTRICT_RULES).map(z =>
              `<option value="${z}"${z==="R6A"?" selected":""}>${z}</option>`
            ).join("")}
          </select>
        </div>
        <div id="estZoneInfo"></div>
      </div>
    `;

    // Render zone info for estimate
    this.updateEstZone();
    document.getElementById("estZoneSelect").addEventListener("change", () => this.updateEstZone());
  }

  estSlider(key, label, min, max, step) {
    return `<div class="ctrl"><label>${label}<span>${this.est[key]}</span></label>
      <input type="range" min="${min}" max="${max}" step="${step}" value="${this.est[key]}"
      oninput="D.est.${key}=+this.value;D.renderEstimate();"></div>`;
  }

  updateEstZone() {
    const sel = document.getElementById("estZoneSelect");
    const div = document.getElementById("estZoneInfo");
    if (!sel || !div) return;
    const z = sel.value;
    const r = Dashboard.DISTRICT_RULES[z];
    if (!r) { div.innerHTML = '<p style="color:var(--text3);font-size:12px;">No rules available for this district.</p>'; return; }

    const sf = this.est ? this.est.interior_sf : 1200;
    // Assume 2500 SF lot for estimation
    const estLot = 2500;
    const needFAR = sf / estLot;
    const farOk = needFAR <= r.far;
    const maxSF = r.far * estLot;

    div.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;">
        <div style="background:var(--bg);border-radius:6px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">Max ${Dashboard.termTip("FAR")}</div>
          <div style="font-size:20px;font-weight:700;color:var(--cyan);">${r.far}</div>
          <div style="font-size:10px;color:${farOk?"var(--green)":"var(--rose)"};margin-top:2px;">
            Your SF needs ${needFAR.toFixed(2)} FAR ${farOk?"✓":"✗"}
          </div>
        </div>
        <div style="background:var(--bg);border-radius:6px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">Max Height</div>
          <div style="font-size:20px;font-weight:700;color:var(--cyan);">${r.height} ft</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">Base: ${r.base||"N/A"}${r.base?" ft":""}</div>
        </div>
        <div style="background:var(--bg);border-radius:6px;padding:10px;text-align:center;">
          <div style="font-size:10px;color:var(--text3);text-transform:uppercase;margin-bottom:4px;">${Dashboard.termTip("Lot Coverage")}</div>
          <div style="font-size:20px;font-weight:700;color:var(--cyan);">${r.lotCov}%</div>
          <div style="font-size:10px;color:var(--text3);margin-top:2px;">Max footprint on lot</div>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-top:8px;">
        On a ${estLot.toLocaleString()} SF lot in ${z}: max buildable area is <strong style="color:var(--text);">${maxSF.toLocaleString()} SF</strong>.
        Your ${sf.toLocaleString()} SF estimate ${farOk
          ? `fits with <span style="color:var(--green);">${(maxSF-sf).toLocaleString()} SF to spare</span>.`
          : `<span style="color:var(--rose);">exceeds the limit by ${(sf-maxSF).toLocaleString()} SF</span>. Consider reducing SF or choosing a higher-density district.`}
        Parking: ${r.parking} spaces per unit required.
      </p>`;
  }

  // ══════════════════════════════════════════
  // CHART FACTORY METHODS
  // ══════════════════════════════════════════
  barChart(id, labels, data, colors, prefix, fmt, horiz) {
    const el = document.getElementById(id);
    if (!el) return null;
    const valFmt = v => fmt==="currency" ? "$"+v.toLocaleString() : v.toLocaleString();
    return new Chart(el.getContext("2d"), {
      type:"bar",
      data: { labels, datasets:[{ data, backgroundColor:colors.map(c=>c+"CC"),
        borderColor:colors, borderWidth:1, borderRadius:4 }] },
      options: {
        indexAxis: horiz?"y":"x", responsive:true, maintainAspectRatio:false,
        plugins: { legend:{display:false},
          tooltip:{callbacks:{label:c=> (fmt==="currency"?"$":"")+c.parsed[horiz?"x":"y"].toLocaleString()}} },
        scales: horiz ? {
          x: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",callback:valFmt} },
          y: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",font:{size:11}} }
        } : {
          x: { grid:{display:false}, ticks:{color:"#94a3b8",font:{size:10},maxRotation:45} },
          y: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",callback:valFmt} }
        }
      }
    });
  }

  lineChart(id, labels, datasets, suffix) {
    const el = document.getElementById(id);
    if (!el) return null;
    return new Chart(el.getContext("2d"), {
      type:"line",
      data: { labels, datasets: datasets.map(ds => ({
        label:ds.label, data:ds.data, borderColor:ds.color,
        backgroundColor:ds.color+"20", borderWidth:2, fill:true,
        tension:.3, pointRadius:2, pointHoverRadius:5
      })) },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:"index",intersect:false},
        plugins: { legend:{labels:{color:"#94a3b8",usePointStyle:true}} },
        scales: {
          x: { grid:{display:false}, ticks:{color:"#94a3b8",maxRotation:45,font:{size:10}} },
          y: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",callback:v=>v+suffix} }
        }
      }
    });
  }

  groupedBar(id, labels, datasets) {
    const el = document.getElementById(id);
    if (!el) return null;
    return new Chart(el.getContext("2d"), {
      type:"bar",
      data: { labels, datasets: datasets.map(ds => ({
        label:ds.label, data:ds.data, backgroundColor:ds.color+"CC",
        borderColor:ds.color, borderWidth:1, borderRadius:4
      })) },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins: { legend:{labels:{color:"#94a3b8"}} },
        scales: {
          x: { grid:{display:false}, ticks:{color:"#94a3b8"} },
          y: { grid:{color:"#1e293b"}, ticks:{color:"#94a3b8",callback:v=>"$"+v.toLocaleString()} }
        }
      }
    });
  }

  doughnut(id, labels, data, colors) {
    const el = document.getElementById(id);
    if (!el) return null;
    return new Chart(el.getContext("2d"), {
      type:"doughnut",
      data: { labels, datasets:[{ data, backgroundColor:colors.map(c=>c+"CC"),
        borderColor:"#111827", borderWidth:2 }] },
      options: {
        responsive:true, maintainAspectRatio:false, cutout:"55%",
        plugins: { legend:{position:"right",labels:{color:"#94a3b8",usePointStyle:true,padding:10,font:{size:11}}} }
      }
    });
  }

  renderZoning() {
    const sec = document.getElementById("sec-zoning");
    if (!this._zoningInited) {
      this._zoningInited = true;
      this._zoningCat = "all";
      this._zoningLegal = false;
      this._zoningQ = "";
    }

    const CAT_COLORS = {
      "Bulk":"#3b82f6","Land Use":"#10b981","Special Districts":"#f59e0b",
      "General":"#94a3b8","Process":"#8b5cf6","Use":"#ec4899",
      "Zoning Districts":"#06b6d4","Housing":"#eab308"
    };
    const CATS = ["all","Land Use","Bulk","Special Districts","General","Process","Use","Zoning Districts","Housing"];
    const CAT_COUNTS = {};
    Dashboard.ZONING_TERMS.forEach(t => { CAT_COUNTS[t.c] = (CAT_COUNTS[t.c]||0)+1; });

    const filtered = Dashboard.ZONING_TERMS.filter(t => {
      if (this._zoningCat !== "all" && t.c !== this._zoningCat) return false;
      if (this._zoningLegal && !t.l) return false;
      if (this._zoningQ) {
        const q = this._zoningQ.toLowerCase();
        return t.t.toLowerCase().includes(q) || t.d.toLowerCase().includes(q) || (t.r&&t.r.toLowerCase().includes(q));
      }
      return true;
    });

    const pillHtml = CATS.map(c => {
      const cnt = c==="all" ? Dashboard.ZONING_TERMS.length : (CAT_COUNTS[c]||0);

      const col = c==="all" ? "var(--blue)" : CAT_COLORS[c];
      return `<button class="zn-pill${active}" data-cat="${c}" style="--pill-c:${col}">${c==="all"?"All":c} <span class="zn-cnt">${cnt}</span></button>`;
    }).join("");

          <div class="zn-def${trunc ? '' : ' zn-def-exp'}" id="zndef${i}">${t.d}</div>

          </div>

      }).join("");

    // District rules table
    const rules = [
      ["Max FAR (Residential)","1.25","2.43","3.0","2.0","4.0","3.44"],
      ["Max FAR (Community Facility)","1.25","4.8","3.0","2.0","4.0","3.44"],
      ["Max Building Height","40 ft","70 ft","70 ft","50 ft","80 ft","75 ft"],
      ["Max Base Height","—","55 ft","60 ft","40 ft","65 ft","60 ft"],
      ["Front Setback","18 ft yard","10 ft","10 ft","5 ft","10 ft","10 ft"],
      ["Rear Yard (min)","30 ft","30 ft","30 ft","30 ft","30 ft","30 ft"],
      ["Max Lot Coverage","55%","65%","70%","60%","65%","65%"],
      ["Quality Housing","N/A","Optional","Mandatory","Mandatory","Mandatory","Optional"],
      ["Sky Exposure Plane","Yes","Yes","No (contextual)","No (contextual)","No (contextual)","Yes"],
      ["Parking (per DU)","1/unit","0.5","0.5","0.5","0.5","0.5"]
    ];
    const dists = ["R5","R6","R6A","R6B","R7A","R7-1"];
    const rulesHtml = `<table style="width:100%;border-collapse:collapse;font-size:12px;">

      <tbody>${rules.map(row => `<tr><td style="padding:8px;border-bottom:1px solid var(--border);font-weight:600;color:var(--text);">${row[0]}</td>
        ${row.slice(1).map((v,i) => {
          const hi = (i>=4) ? "color:var(--green);font-weight:600;" : (i>=1&&i<=2) ? "background:rgba(59,130,246,0.06);" : "";

  // ── COMPLIANCE CHECK ──
  renderCompliance() {
    const L = Dashboard.LAFAYETTE;
    const rules = Dashboard.DISTRICT_RULES[L.zone];
    if (!rules) return '';

    const totalSF = L.units.reduce((s,u) => s+u.sf, 0);
    const totalVal = L.units.reduce((s,u) => s+u.price, 0);
    const proposedFAR = totalSF / L.lotArea;
    const farPct = (proposedFAR / rules.far * 100);
    const farOk = proposedFAR <= rules.far;
    const remainingSF = (rules.far * L.lotArea) - totalSF;

    // Lot coverage — estimate ~65% for 4 attached duplexes
    const estCoverage = 62;
    const covOk = estCoverage <= rules.lotCov;

    // Parking: 0.5 per unit × 4 = 2 spaces required
    const reqParking = Math.ceil(rules.parking * L.units.length);

    const checks = [
      {
        label: `${Dashboard.termTip("Floor Area Ratio")} (${Dashboard.termTip("FAR")})`,
        proposed: proposedFAR.toFixed(2),
        allowed: rules.far.toFixed(1),
        pct: Math.min(farPct,100),
        ok: farOk,
        detail: farOk ? `${Math.round(remainingSF).toLocaleString()} SF remaining` : `Over by ${Math.round(-remainingSF).toLocaleString()} SF`
      },
      {
        label: "Total Floor Area",
        proposed: totalSF.toLocaleString() + " SF",
        allowed: (rules.far * L.lotArea).toLocaleString() + " SF",
        pct: farPct,
        ok: farOk,
        detail: `${L.units.length} units across ${L.lotArea.toLocaleString()} SF lot`
      },
      {
        label: `Max ${Dashboard.termTip("Building Height")}`,
        proposed: "~35 ft (est.)",
        allowed: rules.height + " ft",
        pct: (35/rules.height*100),
        ok: true,
        detail: "2-story duplexes well within limit"
      },
      {
        label: `Max ${Dashboard.termTip("Base Height")}`,
        proposed: "~35 ft (est.)",
        allowed: (rules.base||"N/A") + (rules.base?" ft":""),
        pct: rules.base ? (35/rules.base*100) : 0,
        ok: true,
        detail: rules.base ? "No setback required below base height" : "N/A"
      },
      {
        label: Dashboard.termTip("Lot Coverage"),
        proposed: estCoverage + "%",
        allowed: rules.lotCov + "%",
        pct: (estCoverage/rules.lotCov*100),
        ok: covOk,
        detail: covOk ? `${rules.lotCov - estCoverage}% margin remaining` : "Over coverage limit"
      },
      {
        label: "Parking Required",
        proposed: reqParking + " spaces",
        allowed: rules.parking + " per unit",
        pct: 100,
        ok: true,
        detail: `${L.units.length} units × ${rules.parking} = ${reqParking} spaces`
      }
    ];

    const unitRows = L.units.map(u =>
      `<tr><td style="font-weight:600;">${u.name}</td>
       <td>${u.sf.toLocaleString()} SF</td>
       <td>${u.bed}/${u.bath}</td>
       <td>$${u.price.toLocaleString()}</td>
       <td>$${Math.round(u.price/u.sf).toLocaleString()}/SF</td></tr>`
    ).join("");

    const passCount = checks.filter(c => c.ok).length;
    const allPass = passCount === checks.length;

    return `<div class="card" style="border-color:${allPass?"rgba(16,185,129,.3)":"rgba(244,63,94,.3)"};">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <h3 style="font-size:14px;margin-bottom:4px;">✅ Lafayette Zoning Compliance Check</h3>
          <p class="sub">${L.address} · Zone ${L.zone} · ${L.lotArea.toLocaleString()} SF lot · ${L.units.length} duplex units</p>
        </div>
        <div style="font-size:14px;font-weight:700;color:${allPass?"var(--green)":"var(--rose)"};">
          ${allPass ? "ALL CHECKS PASS ✓" : passCount + "/" + checks.length + " PASSING"}
        </div>
      </div>

      <div style="margin-top:16px;">
        <table style="width:100%;font-size:12px;">
          <thead><tr><th>Unit</th><th>SF</th><th>Bed/Bath</th><th>Price</th><th>$/SF</th></tr></thead>
          <tbody>${unitRows}
            <tr style="border-top:2px solid var(--border);font-weight:700;">
              <td>TOTAL</td>
              <td>${totalSF.toLocaleString()} SF</td>
              <td>${L.units.reduce((s,u)=>s+u.bed,0)}/${L.units.reduce((s,u)=>s+u.bath,0)}</td>
              <td>$${totalVal.toLocaleString()}</td>
              <td>$${Math.round(totalVal/totalSF).toLocaleString()}/SF</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div style="margin-top:16px;">
        ${checks.map(c => `<div class="comply-row">
          <span class="comply-label">${c.label}</span>
          <div class="comply-vals">
            <span class="comply-val">${c.proposed}</span>
            <span style="color:var(--text3);font-size:11px;">of ${c.allowed}</span>
            <div class="comply-bar"><div class="comply-fill" style="width:${Math.min(c.pct,100)}%;background:${c.ok?"var(--green)":"var(--rose)"};"></div></div>
            <span class="${c.ok?"comply-pass":"comply-fail"}">${c.ok?"PASS ✓":"FAIL ✗"}</span>
          </div>
        </div>
        <div style="padding:0 12px 8px;font-size:11px;color:var(--text3);">${c.detail}</div>`).join("")}
      </div>
    </div>`;
  }

  // ── PER-COMP ZONING ANALYSIS ──
  renderAllCompsCompliance() {
    const comps = this.data.comps;
    const rows = comps.map(c => {
      const cc = Dashboard.complianceCheck(c);
      const zone = Dashboard.getZone(c);
      if (!cc) return {comp:c, zone, hasData:false};
      return {comp:c, zone, hasData:true, ...cc};
    });

    const withData = rows.filter(r => r.hasData);
    const okCount = withData.filter(r => r.farOk).length;
    const overCount = withData.length - okCount;

    const tableRows = rows.map(r => {
      if (!r.hasData) {
        return `<tr style="opacity:0.5;">
          <td style="font-size:12px;">${r.comp.address}</td>
          <td><span class="zone-badge" onclick="D.showZoneExplainer('${r.zone.replace(/'/g,"\\'")}')">${r.zone}</span></td>
          <td colspan="4" style="font-size:11px;color:var(--text3);text-align:center;">No PLUTO data</td></tr>`;
      }
      const barW = Math.min(r.farPct, 150);
      const barCol = r.farOk ? "var(--green)" : "var(--rose)";
      return `<tr>
        <td style="font-size:12px;">${r.comp.address}</td>
        <td><span class="zone-badge" onclick="D.showZoneExplainer('${r.zone.replace(/'/g,"\\'")}')">${r.zone}</span></td>
        <td style="text-align:right;font-weight:600;">${r.actualFAR}</td>
        <td style="text-align:right;color:var(--text3);">${r.maxFAR}</td>
        <td><div style="display:flex;align-items:center;gap:6px;">
          <div class="comply-bar" style="width:100px;"><div class="comply-fill" style="width:${Math.min(barW,100)}%;background:${barCol};"></div></div>
          <span class="far-pill ${r.farOk?"far-ok":"far-over"}">${r.farPct}%</span>
        </div></td>
        <td style="text-align:right;font-size:11px;color:var(--text3);">${r.lotArea.toLocaleString()} SF</td></tr>`;
    }).join("");

    return `<div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
        <div>
          <h3 style="font-size:14px;margin-bottom:4px;">📊 Per-Comp Zoning Compliance — All 30 Properties</h3>
          <p class="sub">Real zoning from NYC PLUTO dataset (26/30 matched). FAR utilization = actual building area / (lot area × max FAR).</p>
        </div>
        <div style="display:flex;gap:12px;font-size:13px;">
          <span style="color:var(--green);font-weight:700;">${okCount} compliant</span>
          <span style="color:var(--rose);font-weight:700;">${overCount} over FAR</span>
          <span style="color:var(--text3);">${rows.length - withData.length} no data</span>
        </div>
      </div>
      <div style="margin-top:12px;overflow-x:auto;">
        <table style="width:100%;font-size:12px;">
          <thead><tr>
            <th style="text-align:left;">Address</th>
            <th>Zone</th>
            <th style="text-align:right;">Actual FAR</th>
            <th style="text-align:right;">Max FAR</th>
            <th>Utilization</th>
            <th style="text-align:right;">Lot Area</th>
          </tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-top:12px;">
        Source: NYC PLUTO v24.1 (MapPLUTO). FAR = Total Building Area / Lot Area. Properties showing >100% may have grandfathered or bonus density.
        Click any zone badge for district details.
      </p>
    </div>`;
  }
}

// Helper: wrap a term with a tooltip
Dashboard.termTip = function(text) {
  if (!text) return text;
  const terms = Dashboard.ZONING_TERMS;
  const keys = Dashboard.KEY_TERMS;
  let out = text;
  keys.forEach(key => {
    const re = new RegExp(`\\b(${key.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")})\\b`, "gi");
    const match = terms.find(t => t.t.toLowerCase().includes(key.toLowerCase()));
    if (match) {
      out = out.replace(re, `<span class="zt">$1<span class="zt-tip"><strong>${match.t}</strong>${match.d}</span></span>`);
    }
  });
  return out;
};

// Helper: get zone for a comp (PLUTO-first, neighborhood fallback)
Dashboard.getZone = function(comp) {
  const p = Dashboard.PLUTO[comp.address];
  if (p) return p.zone;
  return Dashboard.ZONE_MAP[comp.neighborhood] || "—";
};

// Helper: get PLUTO data for a comp
Dashboard.getPluto = function(comp) {
  return Dashboard.PLUTO[comp.address] || null;
};

// Helper: get the residential-equivalent zone (strips commercial overlays)
Dashboard.getResZone = function(comp) {
  const p = Dashboard.PLUTO[comp.address];
  if (p) return p.rZone;
  return Dashboard.ZONE_MAP[comp.neighborhood] || "—";
};

// Helper: compute FAR utilization for a comp
Dashboard.complianceCheck = function(comp) {
  const p = Dashboard.getPluto(comp);
  const zone = Dashboard.getZone(comp);
  const rZone = Dashboard.getResZone(comp);
  const rules = Dashboard.DISTRICT_RULES[zone] || Dashboard.DISTRICT_RULES[rZone];
  if (!rules || !p) return null;
  const actualFAR = p.lot > 0 ? (p.bldg / p.lot) : 0;
  const maxFAR = rules.far;
  const farPct = maxFAR > 0 ? (actualFAR / maxFAR * 100) : 0;
  return {
    zone, rZone, rules, pluto: p,
    actualFAR: actualFAR.toFixed(2),
    maxFAR: maxFAR.toFixed(1),
    farPct: Math.round(farPct),
    farOk: actualFAR <= maxFAR,
    heightOk: rules.height ? (p.floors * 10 <= rules.height) : true,
    floors: p.floors,
    maxHeight: rules.height,
    lotArea: p.lot,
    bldgArea: p.bldg,
    source: "PLUTO"
  };
};

// Helper: check if a comp would be legal in a target district
Dashboard.wouldBeLegal = function(comp, targetZone) {
  const p = Dashboard.getPluto(comp);
  const rules = Dashboard.DISTRICT_RULES[targetZone];
  if (!rules || !p || p.lot === 0) return null;
  const actualFAR = p.bldg / p.lot;
  return actualFAR <= rules.far;
};

// District explainer text
Dashboard.districtExplainer = function(zone) {
  const rules = Dashboard.DISTRICT_RULES[zone];
  if (!rules) return null;
  return {
    zone,
    desc: rules.desc || "",
    far: rules.far,
    height: rules.height,
    base: rules.base,
    lotCov: rules.lotCov,
    parking: rules.parking
  };
};
